services:
  - type: web
    name: vsp-dashboard
    env: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    branch: main
    dockerCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
    disk:
      name: vsp-data
      mountPath: /app/data
      sizeGB: 1
